name: Whisp
options:
  bundleIdPrefix: com.benburnette
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO
    OTHER_CODE_SIGN_FLAGS: "--timestamp=none"
    GENERATE_INFOPLIST_FILE: NO
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "100"

targets:
  Whisp:
    type: application
    platform: macOS
    sources:
      - path: App
    dependencies:
      - framework: scripts/sparkle/Sparkle.framework
        embed: true
      - sdk: Speech.framework
      - sdk: AVFoundation.framework
      - sdk: Carbon.framework
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Whisp
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSApplicationCategoryType: public.app-category.productivity
        LSUIElement: true
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: "Free - MIT licensed"
        NSMicrophoneUsageDescription: "Whisp records your voice so it can turn speech into text."
        NSSpeechRecognitionUsageDescription: "Whisp uses macOS Speech Recognition to transcribe your words."
        NSAppleEventsUsageDescription: "Whisp can paste your transcript into the frontmost app after dictation."
        SUPublicEDKey: "CfYNfRbvojf1x4iugpkQGkwNjJCbM5EqSFeIVgyAnu8="
        SUFeedURL: "https://whisp-buz.pages.dev/appcast.xml"
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 14400
        SUAutomaticallyUpdate: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.benburnette.Whisp
        PRODUCT_NAME: Whisp
        CODE_SIGN_ENTITLEMENTS: App/Whisp.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        ENABLE_PREVIEWS: YES
